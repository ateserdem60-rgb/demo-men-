<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Çınar Cafe & Restoran | Dijital Menü</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6EC;
    --bg-wide:#F1E7D2;
    --panel:#FFFFFF;
    --panel-soft:#F5EAD4;
    --ink:#2E2419;
    --ink-dim:#8A7A62;
    --copper:#B8763C;
    --copper-deep:#8C5A2A;
    --ember:#D69A5C;
    --sage:#6E7F55;
    --sage-deep:#4E5D3C;
    --line: rgba(184,118,60,0.20);
    --shadow: 0 18px 38px rgba(70,52,24,0.14);
    --radius-lg: 22px;
    --radius-md: 14px;
    --maxw: 560px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Outfit',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  html.lang-ar body,
  html.lang-ar .hero-title,
  html.lang-ar .brand-mark,
  html.lang-ar h1, html.lang-ar h2, html.lang-ar h3,
  html.lang-ar .item-name, html.lang-ar .hero-tag,
  html.lang-ar .next-strip b, html.lang-ar .lang-current span,
  html.lang-ar .lang-menu button{
    font-family:'Tajawal',sans-serif;
  }

  #stage{
    max-width:var(--maxw);
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  @media (min-width:700px){
    body{
      background:
        radial-gradient(ellipse at 50% -10%, rgba(184,118,60,0.10), transparent 60%),
        var(--bg-wide);
      padding:32px 0;
    }
    #stage{ border-radius:28px; }
  }

  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;}
  ::selection{background:var(--copper);color:#fff;}
  :focus-visible{ outline:2px solid var(--copper-deep); outline-offset:3px; border-radius:6px; }

  .eyebrow{
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--copper-deep); font-weight:600;
  }
  .leaf-icon{ width:1em; height:1em; display:inline-block; vertical-align:-0.15em; }

  .icon-btn{
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.88);
    border:1px solid rgba(184,118,60,0.30);
    backdrop-filter:blur(6px);
    color:var(--ink);
    cursor:pointer;
    transition:transform .25s ease, background .25s ease, border-color .25s ease, color .25s ease;
  }
  .icon-btn:hover{ background:var(--copper); border-color:var(--copper); transform:translateY(-2px); color:#fff;}
  .icon-btn svg{width:19px;height:19px;}

  /* ---------- top bar (home only) ---------- */
  .top-bar{
    position:absolute; top:18px; inset-inline:18px;
    display:flex; justify-content:space-between; align-items:flex-start;
    z-index:5;
  }
  .top-bar-right{ display:flex; align-items:center; gap:9px; }
  .brand-mark{
    display:flex; align-items:center; gap:8px;
    font-family:'Fraunces',serif; font-weight:600; font-size:15px;
    color:#fff; letter-spacing:0.02em;
    text-shadow:0 2px 10px rgba(0,0,0,0.45);
    padding-top:11px;
  }
  .brand-mark .leaf-icon{ color:var(--ember); width:18px;height:18px;}

  /* ---------- language switch ---------- */
  .lang-switch{ position:relative; }
  .lang-current{
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.88); border:1px solid rgba(184,118,60,0.30);
    border-radius:999px; padding:9px 13px; backdrop-filter:blur(6px);
    color:var(--ink); font-size:12px; font-weight:700; letter-spacing:0.04em;
    cursor:pointer; box-shadow:0 6px 14px rgba(70,52,24,0.10);
  }
  .lang-current svg{ width:11px;height:11px; transition:transform .25s ease; color:var(--copper-deep); }
  .lang-switch.open .lang-current svg{ transform:rotate(180deg); }
  .lang-menu{
    position:absolute; top:calc(100% + 8px); inset-inline-end:0;
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; box-shadow:0 16px 34px rgba(70,52,24,0.22);
    padding:6px; min-width:152px;
    display:flex; flex-direction:column; gap:2px;
    opacity:0; transform:translateY(-6px); pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:20;
  }
  .lang-switch.open .lang-menu{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .lang-menu button{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    border:none; background:transparent; color:var(--ink);
    font-size:13px; font-weight:500; text-align:start;
    padding:9px 10px; border-radius:9px; cursor:pointer;
  }
  .lang-menu button:hover{ background:var(--panel-soft); }
  .lang-menu button.active{ color:var(--copper-deep); font-weight:700; }
  .lang-menu button.active::after{ content:"●"; font-size:7px; color:var(--copper); }

  /* ============ HOME VIEW ============ */
  #view-home{ position:relative; }

  .hero{
    position:relative;
    height:60vh; min-height:380px; max-height:540px;
    background-size:cover; background-position:center;
  }
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(38,29,18,0.30) 0%, rgba(38,29,18,0.18) 36%, rgba(38,29,18,0.62) 78%, var(--bg) 100%);
  }
  .hero-watermark{
    position:absolute; left:50%; top:36%; transform:translate(-50%,-50%);
    width:220px; height:220px; opacity:0.18; color:#fff; z-index:1;
  }
  .hero-content{
    position:absolute; left:0; right:0; bottom:74px; z-index:2;
    text-align:center; padding:0 24px;
  }
  .hero-title{
    font-family:'Fraunces',serif; font-weight:700;
    font-size:clamp(40px,11vw,56px); letter-spacing:0.06em;
    color:#fff; text-shadow:0 4px 18px rgba(0,0,0,0.45); margin:0;
  }
  .hero-sub{
    font-size:11px; letter-spacing:0.32em; text-transform:uppercase;
    color:var(--ember); font-weight:700; margin-top:6px;
  }
  .hero-tag{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500;
    font-size:14px; color:#F3E7D2; margin-top:12px;
  }
  html.lang-ar .hero-tag{ font-style:normal; }

  .action-row{
    position:relative; z-index:3;
    display:flex; gap:14px; justify-content:center; margin-top:-30px;
  }

  .section-head{ padding:34px 22px 6px; text-align:center; }
  .section-head h2{ font-family:'Fraunces',serif; font-weight:600; font-size:23px; margin:8px 0 0; color:var(--ink); }
  .divider-leaf{ display:flex; align-items:center; gap:10px; justify-content:center; margin:10px auto 0; color:var(--copper-deep); width:140px; }
  .divider-leaf .line{ flex:1; height:1px; background:var(--line); }

  .cat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:22px 22px 0; }
  .cat-card{
    position:relative; height:168px; border-radius:var(--radius-md);
    overflow:hidden; cursor:pointer; background-size:cover; background-position:center;
    border:1px solid var(--line); transition:transform .3s ease, box-shadow .3s ease;
  }
  .cat-card:hover{ transform:translateY(-4px); box-shadow:0 14px 26px rgba(70,52,24,0.28); }
  .cat-card::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(38,29,18,0.04) 28%, rgba(38,29,18,0.90) 100%);
  }
  .cat-card-body{ position:absolute; inset-inline:0; bottom:0; z-index:2; padding:13px 14px; }
  .cat-card .leaf-icon{ width:16px;height:16px; color:var(--ember); margin-bottom:6px; }
  .cat-card h3{ font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; margin:0; color:#fff; line-height:1.2; }
  .cat-card span{ display:block; margin-top:3px; font-size:10.5px; letter-spacing:0.05em; color:#E8DCC6; }

  .home-footer{ text-align:center; padding:18px 22px 38px; color:var(--ink-dim); font-size:11px; letter-spacing:0.08em; }
  .home-footer .leaf-icon{ width:13px;height:13px; color:var(--sage); margin:0 6px -2px; cursor:pointer; }

  /* ============ CATEGORY VIEW ============ */
  #view-category{
    position:fixed; inset:0; z-index:30;
    max-width:var(--maxw); margin:0 auto;
    background:var(--bg);
    display:flex; flex-direction:column;
    transform:translateX(100%);
    transition:transform .42s cubic-bezier(.65,0,.2,1);
  }
  #view-category.open{ transform:translateX(0); }
  #view-category.slide-left{ transform:translateX(-100%); }

  .cat-header{ position:relative; padding:54px 18px 22px; background-size:cover; background-position:center; flex:none; }
  .cat-header::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(38,29,18,0.42) 0%, rgba(38,29,18,0.62) 55%, var(--bg) 100%);
  }
  .cat-header-row{ position:relative; z-index:2; display:flex; align-items:center; }
  .back-btn{
    display:flex; align-items:center; gap:7px;
    background:rgba(255,255,255,0.88); border:1px solid rgba(184,118,60,0.30);
    border-radius:999px; padding:8px 14px 8px 10px; cursor:pointer;
    color:var(--ink); font-size:12px; font-weight:700; letter-spacing:0.03em;
    backdrop-filter:blur(6px);
    transition:background .25s ease, color .25s ease;
  }
  html.lang-ar .back-btn{ padding:8px 10px 8px 14px; }
  .back-btn:hover{ background:var(--copper); color:#fff; }
  .back-btn svg{ width:15px;height:15px; }
  html.lang-ar .back-btn svg{ transform:scaleX(-1); }

  .cat-title-wrap{ position:relative; z-index:2; margin-top:26px; }
  .cat-title-wrap .eyebrow{ display:block; color:var(--ember); }
  .cat-title-wrap h1{ font-family:'Fraunces',serif; font-weight:700; font-size:30px; margin:6px 0 0; color:#fff; }
  .cat-count{ font-size:12px; color:#E8DCC6; margin-top:4px; }

  .cat-body{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 18px 110px; }

  .item-row{ display:flex; gap:12px; padding:14px 2px; border-bottom:1px solid var(--line); }
  .item-row:last-child{ border-bottom:none; }
  .item-thumb{
    flex:none; width:60px; height:60px; border-radius:13px; overflow:hidden;
    background:var(--panel-soft); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
  }
  .item-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .item-thumb svg{ width:22px; height:22px; color:var(--copper-deep); opacity:0.5; }
  .item-content{ flex:1; min-width:0; }
  .item-top{ display:flex; align-items:baseline; gap:8px; }
  .item-name{ font-family:'Fraunces',serif; font-weight:500; font-size:16px; color:var(--ink); flex:none; }
  .item-trans{ display:block; font-size:11px; font-style:italic; color:var(--ink-dim); margin-top:2px; }
  html.lang-ar .item-trans{ font-style:normal; }
  .item-leader{ flex:1; border-bottom:1px dotted rgba(46,36,25,0.25); transform:translateY(-4px); }
  .item-price{ font-size:13px; color:var(--copper-deep); font-weight:700; flex:none; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .item-desc{ margin:6px 0 0; font-size:12.5px; line-height:1.55; color:var(--ink-dim); }

  .edge-nav{ position:absolute; top:0; bottom:0; width:46px; display:flex; align-items:center; z-index:6; pointer-events:none; }
  .edge-nav.left{ left:0; justify-content:flex-start; }
  .edge-nav.right{ right:0; justify-content:flex-end; }
  .edge-nav button{
    pointer-events:auto; width:38px; height:38px; border-radius:50%;
    background:rgba(255,255,255,0.85); border:1px solid rgba(184,118,60,0.30);
    color:var(--ink); display:flex; align-items:center; justify-content:center;
    cursor:pointer; backdrop-filter:blur(6px);
    transition:background .25s ease, color .25s ease;
  }
  .edge-nav.left button{ margin-left:6px; }
  .edge-nav.right button{ margin-right:6px; }
  .edge-nav button:hover{ background:var(--copper); color:#fff; }
  .edge-nav svg{ width:16px;height:16px; }

  .next-strip{
    position:fixed; left:0; right:0; bottom:0; z-index:7;
    max-width:var(--maxw); margin:0 auto;
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 16px calc(13px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, var(--bg) 60%, rgba(251,246,236,0));
  }
  .next-strip .side{ display:flex; align-items:center; gap:7px; cursor:pointer; font-size:11px; color:var(--ink-dim); letter-spacing:0.03em; }
  .next-strip .side b{ color:var(--copper-deep); font-family:'Fraunces',serif; font-weight:600; font-size:12.5px; }
  .next-strip .side.right{ flex-direction:row-reverse; text-align:right; }
  .next-strip svg{ width:13px;height:13px; color:var(--copper); }

  /* ============ ADMIN ============ */
  #view-admin-login, #view-admin{
    position:fixed; inset:0; z-index:50;
    max-width:var(--maxw); margin:0 auto;
    background:var(--bg);
    display:none;
  }
  #view-admin-login.open, #view-admin.open{ display:block; }

  .admin-login-card{
    max-width:340px; margin:18vh auto 0; padding:32px 26px;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg);
    box-shadow:var(--shadow); text-align:center;
  }
  .admin-login-icon{ width:30px; height:30px; color:var(--copper-deep); margin-bottom:10px; }
  .admin-login-card h2{ font-family:'Fraunces',serif; font-size:19px; margin:0 0 6px; color:var(--ink); }
  .admin-login-card p{ font-size:12.5px; color:var(--ink-dim); margin:0 0 16px; }
  .admin-login-card input{
    width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); color:var(--ink); font-size:14px; text-align:center;
  }
  .admin-login-error{ display:none; color:#A9432F; font-size:12px; margin-top:8px; }
  .admin-login-error.show{ display:block; }
  .admin-login-actions{ display:flex; gap:10px; margin-top:16px; }
  .admin-login-actions .admin-btn{ flex:1; }

  .admin-btn{
    border:1px solid var(--line); border-radius:10px; padding:10px 14px;
    font-size:13px; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--panel); color:var(--ink);
  }
  .admin-btn svg{ width:14px;height:14px; }
  .admin-btn.primary{ background:var(--copper); border-color:var(--copper); color:#fff; }
  .admin-btn.ghost{ background:transparent; }
  .admin-btn.small{ padding:8px 11px; font-size:12px; }
  .admin-btn.danger{ color:#A9432F; border-color:rgba(169,67,47,0.35); }

  .admin-topbar{
    position:sticky; top:0; z-index:2;
    background:var(--bg); border-bottom:1px solid var(--line);
    padding:16px 18px; display:flex; justify-content:space-between; align-items:center;
  }
  .admin-topbar-title{ display:flex; align-items:center; gap:8px; font-family:'Fraunces',serif; font-weight:600; font-size:16px; color:var(--ink); }
  .admin-topbar-title .leaf-icon{ color:var(--copper); width:16px;height:16px; }
  .admin-topbar-actions{ display:flex; gap:8px; }

  .admin-body{ padding:18px; padding-bottom:60px; height:calc(100vh - 66px); overflow-y:auto; }
  .admin-section{ margin-bottom:26px; }
  .admin-section-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .admin-section-head h3{ font-family:'Fraunces',serif; font-size:15px; margin:0; color:var(--ink); }

  .admin-field{ margin-bottom:10px; }
  .admin-field label{ display:block; font-size:11px; color:var(--ink-dim); margin-bottom:4px; letter-spacing:0.02em; }
  .admin-field input, .admin-field textarea{
    width:100%; padding:9px 11px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:13px; font-family:inherit;
  }
  .admin-field textarea{ resize:vertical; min-height:52px; }
  .admin-saved-msg{ display:none; font-size:11.5px; color:var(--sage-deep); margin-top:6px; }
  .admin-saved-msg.show{ display:block; }


  .admin-list{ display:flex; flex-direction:column; gap:8px; }
  .admin-row{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:8px 10px;
  }
  .admin-row-thumb{ width:40px; height:40px; border-radius:9px; overflow:hidden; flex:none; background:var(--panel-soft); display:flex; align-items:center; justify-content:center; }
  .admin-row-thumb img{ width:100%; height:100%; object-fit:cover; }
  .admin-row-thumb svg{ width:16px;height:16px; color:var(--copper-deep); opacity:0.5; }
  .admin-row-main{ flex:1; min-width:0; cursor:pointer; }
  .admin-row-main .name{ font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .admin-row-main .meta{ font-size:11px; color:var(--ink-dim); margin-top:1px; }
  .admin-row-actions{ display:flex; gap:4px; flex:none; }
  .admin-row-actions button{
    width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--bg);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink);
  }
  .admin-row-actions button svg{ width:13px;height:13px; }
  .admin-row-actions button:hover{ background:var(--panel-soft); }

  #admin-modal{
    position:fixed; inset:0; z-index:60; display:none;
    background:rgba(46,36,25,0.45); backdrop-filter:blur(3px);
    align-items:flex-end; justify-content:center;
  }
  #admin-modal.open{ display:flex; }
  .admin-modal-card{
    width:100%; max-width:var(--maxw); max-height:88vh; overflow-y:auto;
    background:var(--bg); border-radius:22px 22px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 30px rgba(0,0,0,0.3);
  }
  .admin-modal-card h3{ font-family:'Fraunces',serif; font-size:17px; margin:0 0 14px; color:var(--ink); }
  .admin-modal-row{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .admin-upload-row{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .admin-upload-preview{ width:56px; height:56px; border-radius:12px; overflow:hidden; background:var(--panel-soft); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; flex:none; }
  .admin-upload-preview img{ width:100%; height:100%; object-fit:cover; }
  .admin-upload-preview svg{ width:20px;height:20px; color:var(--copper-deep); opacity:0.5; }
  .admin-modal-actions{ display:flex; gap:10px; margin-top:16px; }
  .admin-modal-actions .admin-btn{ flex:1; }

  @media (prefers-reduced-motion: reduce){
    #view-category{ transition:none; }
    .cat-card, .icon-btn, .back-btn, .lang-menu, .lang-current svg{ transition:none; }
  }
</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js"></script>
</head>

function showMenuLoading(show){
  let el = document.getElementById('menu-loading');
  if(!el){
    el = document.createElement('div');
    el.id = 'menu-loading';
    el.style.cssText = 'position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:80;font-size:13px;color:var(--ink-dim);letter-spacing:0.04em;';
    el.innerHTML = '<svg style="width:36px;height:36px;animation:spin 1.2s linear infinite;color:var(--copper)" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40" stroke-linecap="round"/></svg><span id="menu-loading-text"></span>';
    document.body.appendChild(el);
    if(!document.getElementById('admin-spin-style')){
      const st = document.createElement('style');
      st.id='admin-spin-style';
      st.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(st);
    }
  }
  el.style.display = show ? 'flex' : 'none';
  if(show){
    const t = document.getElementById('menu-loading-text');
    if(t) t.textContent = STRINGS[lang].loading;
  }
}

function showMenuError(msg){
  let el = document.getElementById('menu-loading');
  if(el){ el.style.display='none'; }
  const grid = document.getElementById('cat-grid');
  if(grid) grid.innerHTML = `<p style="text-align:center;padding:40px 20px;color:var(--copper-deep);font-size:14px;">${msg}</p>`;
}

/* ── Supabase: Menüyü Yükle ──────────────────────────────────── */
async function loadMenuFromSupabase(){
  const { data: cats, error } = await sb
    .from('categories')
    .select(`id, name_tr, name_en, name_de, name_ar, image_url, sort_order,
             products(id, name_tr, name_en, name_de, name_ar,
                      description_tr, description_en, description_de, description_ar,
                      price, image_url, is_available, sort_order)`)
    .eq('is_active', true)
    .order('sort_order');

  if(error){
    console.error('Supabase hata:', error);
    const grid = document.getElementById('cat-grid');
    if(grid) grid.innerHTML = `<div style="padding:20px;color:red;font-size:12px;word-break:break-all;">
      <b>Bağlantı hatası:</b><br>${error.message || JSON.stringify(error)}
    </div>`;
    return false;
  }

  CATEGORIES = (cats || []).map(cat => ({
    id:      cat.id,
    tr:      cat.name_tr,
    en:      cat.name_en  || cat.name_tr,
    de:      cat.name_de  || cat.name_tr,
    ar:      cat.name_ar  || cat.name_tr,
    cardImg: cat.image_url || null,
    items:   (cat.products || [])
      .filter(p => p.is_available)
      .sort((a,b) => a.sort_order - b.sort_order)
      .map(p => ({
        id:   p.id,
        tr:   p.name_tr,
        en:   p.name_en || p.name_tr,
        de:   p.name_de || p.name_tr,
        ar:   p.name_ar || p.name_tr,
        img:  p.image_url || null,
        price: p.price != null ? {
          tr:`${parseFloat(p.price).toFixed(0)} ₺`,
          en:`₺${parseFloat(p.price).toFixed(0)}`,
          de:`${parseFloat(p.price).toFixed(0)} ₺`,
          ar:`${parseFloat(p.price).toFixed(0)} ₺`
        } : null,
        desc: p.description_tr ? {
          tr: p.description_tr,
          en: p.description_en || p.description_tr,
          de: p.description_de || p.description_tr,
          ar: p.description_ar || p.description_tr
        } : null
      }))
  }));
  return true;
}

/* ── Dil ─────────────────────────────────────────────────────── */
function toggleLangMenu(){
  const sw = document.getElementById('lang-switch');
  const willOpen = !sw.classList.contains('open');
  sw.classList.toggle('open', willOpen);
  document.getElementById('lang-current-btn').setAttribute('aria-expanded', willOpen);
}
function closeLangMenu(){
  document.getElementById('lang-switch').classList.remove('open');
  document.getElementById('lang-current-btn').setAttribute('aria-expanded','false');
}
document.addEventListener('click', e=>{
  const sw = document.getElementById('lang-switch');
  if(sw && sw.classList.contains('open') && !sw.contains(e.target)){
    sw.classList.remove('open');
    document.getElementById('lang-current-btn').setAttribute('aria-expanded','false');
  }
});

function setLang(l){
  lang = l;
  const s = STRINGS[l];
  document.documentElement.lang = l;
  document.documentElement.dir = (l==='ar') ? 'rtl' : 'ltr';
  document.documentElement.classList.toggle('lang-ar', l==='ar');
  document.getElementById('lang-current-code').textContent = LANG_NAMES[l];
  document.querySelectorAll('.lang-menu button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === l);
  });
  closeLangMenu();
  document.getElementById('t-subtitle').textContent  = s.subtitle;
  document.getElementById('t-tag').textContent       = s.tag;
  document.getElementById('t-eyebrow1').textContent  = s.eyebrow1;
  document.getElementById('t-menucats').textContent  = s.menuCats;
  document.getElementById('t-footertag').textContent = s.footerTag;
  document.getElementById('t-menuword').textContent  = s.menuWord;
  buildHomeGrid();
  if(currentIndex >= 0) renderCategory(currentIndex);
}

/* ── Anasayfa Grid ───────────────────────────────────────────── */
function buildHomeGrid(){
  const s    = STRINGS[lang];
  const grid = document.getElementById('cat-grid');
  if(!grid) return;
  grid.innerHTML = CATEGORIES.map((c,i)=>`
    <div class="cat-card" style="background-image:url('${c.cardImg || ''}')" onclick="openCategory(${i})">
      <div class="cat-card-body">
        <svg class="leaf-icon"><use href="#icon-leaf"/></svg>
        <h3>${c[lang]}</h3>
        <span>${c.items.length} ${s.items}</span>
      </div>
    </div>
  `).join('');
}

/* ── Kategori Görünümü ───────────────────────────────────────── */
function openCategory(i){
  currentIndex = i;
  renderCategory(i);
  const view = document.getElementById('view-category');
  view.classList.add('open');
  view.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
}
function goHome(){
  const view = document.getElementById('view-category');
  view.classList.remove('open');
  view.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
  currentIndex = -1;
}
function navigate(dir){
  if(currentIndex < 0) return;
  const view = document.getElementById('view-category');
  const next = (currentIndex + dir + CATEGORIES.length) % CATEGORIES.length;
  view.classList.add(dir > 0 ? 'slide-left' : '');
  setTimeout(()=>{
    currentIndex = next;
    renderCategory(currentIndex);
    view.classList.remove('slide-left');
    if(dir < 0){
      view.style.transition = 'none';
      view.style.transform   = 'translateX(-100%)';
      requestAnimationFrame(()=>{
        view.style.transition = '';
        view.style.transform   = 'translateX(0)';
      });
    }
    document.getElementById('cat-body').scrollTop = 0;
  }, dir ? 220 : 0);
}
function renderCategory(i){
  const c = CATEGORIES[i];
  const s = STRINGS[lang];
  document.getElementById('cat-header-bg').style.backgroundImage =
    `url('${c.cardImg || ''}')`;
  document.getElementById('cat-eyebrow').textContent = s.category;
  document.getElementById('cat-title').textContent   = c[lang];
  document.getElementById('cat-count').textContent   = `${c.items.length} ${s.items}`;
  document.getElementById('cat-body').innerHTML = c.items.map(it=>`
    <div class="item-row">
      <div class="item-thumb">
        ${it.img ? `<img src="${it.img}" alt="${it[lang]}" loading="lazy">` : `<svg><use href="#icon-leaf"/></svg>`}
      </div>
      <div class="item-content">
        <div class="item-top">
          <div>
            <div class="item-name">${it[lang]}</div>
            ${(lang!=='tr'||it.tr===it.en) ? '' : `<span class="item-trans">${it.en}</span>`}
          </div>
          <div class="item-leader"></div>
          <div class="item-price">${it.price ? it.price[lang] : '₺ —'}</div>
        </div>
        ${it.desc ? `<p class="item-desc">${it.desc[lang]}</p>` : ''}
      </div>
    </div>
  `).join('');
  const prev = CATEGORIES[(i-1+CATEGORIES.length)%CATEGORIES.length];
  const next = CATEGORIES[(i+1)%CATEGORIES.length];
  document.getElementById('prev-name').textContent = prev[lang];
  document.getElementById('next-name').textContent = next[lang];
}

/* ── Swipe + Klavye ──────────────────────────────────────────── */
(function(){
  let startX = null;
  const body = document.getElementById('cat-body');
  body.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; },{passive:true});
  body.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(Math.abs(dx) > 55) navigate(dx < 0 ? 1 : -1);
    startX = null;
  },{passive:true});
  document.addEventListener('keydown', e=>{
    if(currentIndex < 0) return;
    if(e.key==='ArrowRight') navigate(1);
    if(e.key==='ArrowLeft')  navigate(-1);
    if(e.key==='Escape')     goHome();
  });
})();

let adminPendingImageFile= null;

/* ── Yardımcı ────────────────────────────────────────────────── */
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function adminToast(msg, isError=false){
  let el = document.getElementById('admin-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'admin-toast';
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:100;transition:opacity .3s;white-space:nowrap;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = isError ? '#A9432F' : '#5B6E47';
  el.style.color = '#fff';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; }, 2200);
}

function adminLoading(btn, loading){
  if(!btn) return;
  if(loading){ btn._origText = btn.innerHTML; btn.innerHTML='<svg style="width:16px;height:16px;animation:spin 1s linear infinite" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="40" stroke-linecap="round"/></svg>'; btn.disabled=true; }
  else{ if(btn._origText) btn.innerHTML=btn._origText; btn.disabled=false; }
}

/* ── Görsel Yükleme → Supabase Storage ─────────────────────── */
async function uploadImageToStorage(file, folder){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const side = Math.min(img.width, img.height);
        const canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 300;
        canvas.getContext('2d').drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,300,300);
        canvas.toBlob(async blob=>{
          const filename = `${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
          const { error: upErr } = await sb.storage.from('menu-images').upload(filename, blob, {contentType:'image/jpeg', upsert:false});
          if(upErr){ reject(upErr); return; }
          const { data:{publicUrl} } = sb.storage.from('menu-images').getPublicUrl(filename);
          resolve(publicUrl);
        }, 'image/jpeg', 0.82);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function handleAdminImageUpload(evt, previewId){
  const file = evt.target.files[0];
  if(!file) return;
  adminPendingImageFile = file;
  const reader = new FileReader();
  reader.onload = e=>{
    const el = document.getElementById(previewId);
    if(el) el.innerHTML = `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

/* ── Giriş ───────────────────────────────────────────────────── */
function openAdminLogin(){
  document.getElementById('admin-password-input').value = '';
  document.getElementById('admin-login-error').classList.remove('show');
  document.getElementById('view-admin-login').classList.add('open');
  document.getElementById('view-admin-login').setAttribute('aria-hidden','false');
}
function closeAdminLogin(){
  document.getElementById('view-admin-login').classList.remove('open');
  document.getElementById('view-admin-login').setAttribute('aria-hidden','true');
}
function submitAdminLogin(){
  if(document.getElementById('admin-password-input').value === ADMIN_PASSWORD){
    closeAdminLogin();
    enterAdmin();
  } else {
    document.getElementById('admin-login-error').classList.add('show');
  }
}
function enterAdmin(){
  adminSelectedCatId = null;
  document.getElementById('admin-items-section').style.display = 'none';
  document.getElementById('admin-input-phone').value     = RESTAURANT_PHONE;
  document.getElementById('admin-input-maps').value      = RESTAURANT_MAPS;
  document.getElementById('admin-input-instagram').value = RESTAURANT_INSTAGRAM;
  renderAdminCategories();
  document.getElementById('view-admin').classList.add('open');
  document.getElementById('view-admin').setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
  loadAdminCategories();
}
function exitAdmin(){
  document.getElementById('view-admin').classList.remove('open');
  document.getElementById('view-admin').setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
  loadMenuFromSupabase().then(()=>{ setLang(lang); if(currentIndex>=0) renderCategory(currentIndex); });
}

/* ── Ayarlar (Statik - kod içinde) ──────────────────────────── */
function saveAdminSettings(){
  adminToast('Bu bilgiler kod içindedir. Değiştirmek için Claude ile iletişime geçin.');
  document.getElementById('admin-settings-saved').classList.add('show');
  setTimeout(()=>document.getElementById('admin-settings-saved').classList.remove('show'), 2200);
}

/* ── Kategoriler — Supabase ─────────────────────────────────── */
let adminCategories = [];

async function loadAdminCategories(){
  const { data, error } = await sb.from('categories').select('*').order('sort_order');
  if(error){ adminToast('Kategoriler yüklenemedi', true); return; }
  adminCategories = data || [];
  renderAdminCategories();
}

function renderAdminCategories(){
  const list = document.getElementById('admin-category-list');
  if(!list) return;
  list.innerHTML = adminCategories.map((c,i)=>`
    <div class="admin-row">
      <div class="admin-row-thumb">${c.image_url ? `<img src="${c.image_url}">` : `<svg><use href="#icon-image"/></svg>`}</div>
      <div class="admin-row-main" onclick="selectAdminCategory('${c.id}')">
        <div class="name">${esc(c.name_tr)}</div>
        <div class="meta">${c.is_active ? '✓ Yayında' : '✗ Gizli'}</div>
      </div>
      <div class="admin-row-actions">
        <button onclick="moveCategorySupabase('${c.id}',-1)" aria-label="Yukarı"><svg><use href="#icon-up"/></svg></button>
        <button onclick="moveCategorySupabase('${c.id}',1)" aria-label="Aşağı"><svg><use href="#icon-down"/></svg></button>
        <button onclick="openCategoryForm('${c.id}')" aria-label="Düzenle"><svg><use href="#icon-edit"/></svg></button>
        <button onclick="deleteCategorySupabase('${c.id}')" aria-label="Sil"><svg><use href="#icon-trash"/></svg></button>
      </div>
    </div>
  `).join('');
}

async function moveCategorySupabase(id, dir){
  const idx = adminCategories.findIndex(c=>c.id===id);
  const j = idx+dir;
  if(j<0||j>=adminCategories.length) return;
  const a = adminCategories[idx], b = adminCategories[j];
  const [oa, ob] = [a.sort_order, b.sort_order];
  const { error } = await sb.from('categories').upsert([
    {...a, sort_order: ob}, {...b, sort_order: oa}
  ]);
  if(error){ adminToast('Sıralama güncellenemedi', true); return; }
  await loadAdminCategories();
}

async function deleteCategorySupabase(id){
  const cat = adminCategories.find(c=>c.id===id);
  if(!cat||!confirm(`"${cat.name_tr}" kategorisini ve tüm ürünlerini silmek istediğine emin misin?`)) return;
  const { error } = await sb.from('categories').delete().eq('id', id);
  if(error){ adminToast('Silinemedi: '+error.message, true); return; }
  adminToast('Kategori silindi.');
  if(adminSelectedCatId===id){ adminSelectedCatId=null; document.getElementById('admin-items-section').style.display='none'; }
  await loadAdminCategories();
}

function selectAdminCategory(catId){
  adminSelectedCatId = catId;
  const cat = adminCategories.find(c=>c.id===catId);
  document.getElementById('admin-items-section').style.display = 'block';
  document.getElementById('admin-items-title').textContent = cat ? `Ürünler — ${cat.name_tr}` : 'Ürünler';
  loadAdminProducts(catId);
  document.getElementById('admin-items-section').scrollIntoView({behavior:'smooth',block:'start'});
}

function openCategoryForm(catId){
  adminEditingCatId    = catId || null;
  adminPendingImageUrl = null;
  adminPendingImageFile= null;
  const cat = catId ? adminCategories.find(c=>c.id===catId) : null;
  if(cat){ adminPendingImageUrl = cat.image_url||null; }
  document.getElementById('admin-modal-card').innerHTML = `
    <h3>${cat ? 'Kategoriyi Düzenle' : 'Yeni Kategori'}</h3>
    <div class="admin-upload-row">
      <div class="admin-upload-preview" id="admin-cat-img-preview">${adminPendingImageUrl ? `<img src="${adminPendingImageUrl}">` : `<svg><use href="#icon-image"/></svg>`}</div>
      <div><input type="file" accept="image/*" onchange="handleAdminImageUpload(event,'admin-cat-img-preview')"><small style="display:block;margin-top:4px;color:var(--ink-dim);font-size:11px;">300×300 px'e kırpılır, Supabase'e yüklenir.</small></div>
    </div>
    <div class="admin-field"><label>Türkçe Ad *</label><input id="admin-cat-tr" value="${cat?esc(cat.name_tr):''}"></div>
    <div class="admin-modal-row">
      <div class="admin-field"><label>İngilizce</label><input id="admin-cat-en" value="${cat?esc(cat.name_en||''):''}"></div>
      <div class="admin-field"><label>Almanca</label><input id="admin-cat-de" value="${cat?esc(cat.name_de||''):''}"></div>
    </div>
    <div class="admin-field"><label>Arapça</label><input id="admin-cat-ar" value="${cat?esc(cat.name_ar||''):''}"></div>
    <div class="admin-field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="admin-cat-active" ${(!cat||cat.is_active)?'checked':''} style="width:auto;">
      Kategoryi yayında göster
    </label></div>
    <div class="admin-modal-actions">
      <button class="admin-btn ghost" onclick="closeAdminModal()">Vazgeç</button>
      <button class="admin-btn primary" id="admin-cat-save-btn" onclick="saveCategoryForm(this)">Kaydet</button>
    </div>
  `;
  openAdminModal();
}

async function saveCategoryForm(btn){
  const tr = document.getElementById('admin-cat-tr').value.trim();
  if(!tr){ alert('Türkçe ad zorunlu.'); return; }
  adminLoading(btn, true);
  try{
    let imgUrl = adminPendingImageUrl;
    if(adminPendingImageFile){
      imgUrl = await uploadImageToStorage(adminPendingImageFile, 'categories');
    }
    const payload = {
      name_tr: tr,
      name_en: document.getElementById('admin-cat-en').value.trim() || tr,
      name_de: document.getElementById('admin-cat-de').value.trim() || tr,
      name_ar: document.getElementById('admin-cat-ar').value.trim() || tr,
      image_url: imgUrl||null,
      is_active: document.getElementById('admin-cat-active').checked,
    };
    let error;
    if(adminEditingCatId){
      ({error} = await sb.from('categories').update(payload).eq('id', adminEditingCatId));
    } else {
      payload.sort_order = adminCategories.length;
      ({error} = await sb.from('categories').insert(payload));
    }
    if(error) throw error;
    adminToast(adminEditingCatId ? 'Kategori güncellendi.' : 'Kategori eklendi.');
    closeAdminModal();
    await loadAdminCategories();
  } catch(e){ adminToast('Hata: '+e.message, true); adminLoading(btn, false); }
}

/* ── Ürünler — Supabase ─────────────────────────────────────── */
let adminProducts = [];

async function loadAdminProducts(catId){
  const { data, error } = await sb.from('products').select('*').eq('category_id', catId).order('sort_order');
  if(error){ adminToast('Ürünler yüklenemedi', true); return; }
  adminProducts = data || [];
  renderAdminProducts();
}

function renderAdminProducts(){
  const list = document.getElementById('admin-item-list');
  if(!list) return;
  list.innerHTML = adminProducts.map((p,i)=>`
    <div class="admin-row">
      <div class="admin-row-thumb">${p.image_url ? `<img src="${p.image_url}">` : `<svg><use href="#icon-image"/></svg>`}</div>
      <div class="admin-row-main" onclick="openItemForm('${p.id}')">
        <div class="name">${esc(p.name_tr)}</div>
        <div class="meta">${p.price ? parseFloat(p.price).toFixed(0)+' ₺' : 'Fiyat yok'} · ${p.is_available ? '✓ Stokta' : '✗ Tükendi'}</div>
      </div>
      <div class="admin-row-actions">
        <button onclick="moveProductSupabase('${p.id}',-1)" aria-label="Yukarı"><svg><use href="#icon-up"/></svg></button>
        <button onclick="moveProductSupabase('${p.id}',1)" aria-label="Aşağı"><svg><use href="#icon-down"/></svg></button>
        <button onclick="toggleAvailableSupabase('${p.id}',${!p.is_available})" aria-label="Stok Durumu" title="${p.is_available?'Stoktan kaldır':'Stoka ekle'}"><svg><use href="${p.is_available?'#icon-close':'#icon-plus'}"/></svg></button>
        <button onclick="openItemForm('${p.id}')" aria-label="Düzenle"><svg><use href="#icon-edit"/></svg></button>
        <button onclick="deleteProductSupabase('${p.id}')" aria-label="Sil"><svg><use href="#icon-trash"/></svg></button>
      </div>
    </div>
  `).join('');
}

async function moveProductSupabase(id, dir){
  const idx = adminProducts.findIndex(p=>p.id===id);
  const j = idx+dir;
  if(j<0||j>=adminProducts.length) return;
  const a = adminProducts[idx], b = adminProducts[j];
  const [oa, ob] = [a.sort_order, b.sort_order];
  const { error } = await sb.from('products').upsert([
    {...a, sort_order:ob}, {...b, sort_order:oa}
  ]);
  if(error){ adminToast('Sıralama güncellenemedi', true); return; }
  await loadAdminProducts(adminSelectedCatId);
}

async function toggleAvailableSupabase(id, newVal){
  const { error } = await sb.from('products').update({is_available:newVal}).eq('id',id);
  if(error){ adminToast('Güncelleme başarısız', true); return; }
  adminToast(newVal ? 'Ürün stoka eklendi.' : 'Ürün tükendi olarak işaretlendi.');
  await loadAdminProducts(adminSelectedCatId);
}

async function deleteProductSupabase(id){
  const p = adminProducts.find(x=>x.id===id);
  if(!p||!confirm(`"${p.name_tr}" ürününü silmek istediğine emin misin?`)) return;
  const { error } = await sb.from('products').delete().eq('id',id);
  if(error){ adminToast('Silinemedi: '+error.message, true); return; }
  adminToast('Ürün silindi.');
  await loadAdminProducts(adminSelectedCatId);
}

function openItemForm(id){
  adminEditingItemId   = id || null;
  adminPendingImageUrl = null;
  adminPendingImageFile= null;
  const p = id ? adminProducts.find(x=>x.id===id) : null;
  if(p){ adminPendingImageUrl = p.image_url||null; }
  const priceVal = p&&p.price!=null ? parseFloat(p.price).toFixed(0) : '';
  document.getElementById('admin-modal-card').innerHTML = `
    <h3>${p ? 'Ürünü Düzenle' : 'Yeni Ürün'}</h3>
    <div class="admin-upload-row">
      <div class="admin-upload-preview" id="admin-item-img-preview">${adminPendingImageUrl ? `<img src="${adminPendingImageUrl}">` : `<svg><use href="#icon-image"/></svg>`}</div>
      <div><input type="file" accept="image/*" onchange="handleAdminImageUpload(event,'admin-item-img-preview')"><small style="display:block;margin-top:4px;color:var(--ink-dim);font-size:11px;">300×300 px'e kırpılır, Supabase'e yüklenir.</small></div>
    </div>
    <div class="admin-modal-row">
      <div class="admin-field"><label>Türkçe Ad *</label><input id="admin-item-tr" value="${p?esc(p.name_tr):''}"></div>
      <div class="admin-field"><label>İngilizce</label><input id="admin-item-en" value="${p?esc(p.name_en||''):''}"></div>
    </div>
    <div class="admin-modal-row">
      <div class="admin-field"><label>Almanca</label><input id="admin-item-de" value="${p?esc(p.name_de||''):''}"></div>
      <div class="admin-field"><label>Arapça</label><input id="admin-item-ar" value="${p?esc(p.name_ar||''):''}"></div>
    </div>
    <div class="admin-field"><label>Fiyat (₺, boş = fiyat gösterilmez)</label><input id="admin-item-price" value="${priceVal}" inputmode="decimal" placeholder="örn: 150"></div>
    <div class="admin-field"><label>Açıklama (Türkçe)</label><textarea id="admin-item-desc-tr">${p?esc(p.description_tr||''):''}</textarea></div>
    <div class="admin-field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="admin-item-available" ${(!p||p.is_available)?'checked':''} style="width:auto;">
      Stokta mevcut (menüde göster)
    </label></div>
    <div class="admin-modal-actions">
      <button class="admin-btn ghost" onclick="closeAdminModal()">Vazgeç</button>
      <button class="admin-btn primary" id="admin-item-save-btn" onclick="saveItemForm(this)">Kaydet</button>
    </div>
  `;
  openAdminModal();
}

async function saveItemForm(btn){
  const tr = document.getElementById('admin-item-tr').value.trim();
  if(!tr){ alert('Türkçe ad zorunlu.'); return; }
  adminLoading(btn, true);
  try{
    let imgUrl = adminPendingImageUrl;
    if(adminPendingImageFile){
      imgUrl = await uploadImageToStorage(adminPendingImageFile, 'products');
    }
    const priceRaw = document.getElementById('admin-item-price').value.trim();
    const descTr   = document.getElementById('admin-item-desc-tr').value.trim();
    const payload = {
      name_tr: tr,
      name_en: document.getElementById('admin-item-en').value.trim() || tr,
      name_de: document.getElementById('admin-item-de').value.trim() || tr,
      name_ar: document.getElementById('admin-item-ar').value.trim() || tr,
      price:       priceRaw ? parseFloat(priceRaw) : null,
      image_url:   imgUrl||null,
      description_tr: descTr||null,
      is_available: document.getElementById('admin-item-available').checked,
    };
    let error;
    if(adminEditingItemId){
      ({error} = await sb.from('products').update(payload).eq('id', adminEditingItemId));
    } else {
      payload.category_id = adminSelectedCatId;
      payload.sort_order  = adminProducts.length;
      ({error} = await sb.from('products').insert(payload));
    }
    if(error) throw error;
    adminToast(adminEditingItemId ? 'Ürün güncellendi.' : 'Ürün eklendi.');
    closeAdminModal();
    await loadAdminProducts(adminSelectedCatId);
  } catch(e){ adminToast('Hata: '+e.message, true); adminLoading(btn, false); }
}

/* ── Modal ───────────────────────────────────────────────────── */
function openAdminModal(){
  document.getElementById('admin-modal').classList.add('open');
  document.getElementById('admin-modal').setAttribute('aria-hidden','false');
}
function closeAdminModal(){
  document.getElementById('admin-modal').classList.remove('open');
  document.getElementById('admin-modal').setAttribute('aria-hidden','true');
  adminEditingCatId    = null;
  adminEditingItemId   = null;
  adminPendingImageUrl = null;
  adminPendingImageFile= null;
}

/* ── Gizli Erişim: Footer Yaprak × 5 ───────────────────────── */
let footerTapCount = 0, footerTapTimer = null;
function footerLeafTap(){
  footerTapCount++;
  clearTimeout(footerTapTimer);
  footerTapTimer = setTimeout(()=>{ footerTapCount=0; }, 2500);
  if(footerTapCount>=5){ footerTapCount=0; openAdminLogin(); }
}
if(new URLSearchParams(window.location.search).get('admin')!==null){
  openAdminLogin();
}

/* ── Başlatma ────────────────────────────────────────────────── */
(async function init(){
  setLang('tr');
  showMenuLoading(true);
  const ok = await loadMenuFromSupabase();
  showMenuLoading(false);
  if(!ok){ showMenuError(STRINGS[lang].errorLoad); return; }
  buildHomeGrid();
})();
</script>
